<script>
  // 加载进度模拟
  const fill = document.getElementById('loader-fill')
  const status = document.getElementById('loader-status')
  const pct = document.getElementById('loader-pct')
  const loader = document.getElementById('app-loader')

  const steps = [
    { p: 10, text: '正在初始化系统...' },
    { p: 25, text: '加载资源文件...' },
    { p: 45, text: '初始化 3D 引擎...' },
    { p: 65, text: '加载场景模型...' },
    { p: 80, text: '配置设备数据...' },
    { p: 95, text: '渲染用户界面...' },
    { p: 100, text: '启动完成' },
  ]

  let i = 0
  let vueReady = false
  let modelLoaded = false // 专门标记模型是否加载完成
  let realProgress = 0
  let loaderHidden = false 

  // 模拟进度条动画（仅用于视觉反馈，不控制隐藏）
  const timer = setInterval(() => {
    if (i >= steps.length) {
      clearInterval(timer)
      return
    }
    
    const s = steps[i++]
    // 只显示模拟进度，如果真实进度更高则显示真实进度
    const displayP = Math.max(s.p, realProgress)
    
    // 如果模型还没加载完，进度条不要超过95%，等待真实进度
    if (!modelLoaded) {
      if (displayP < 95) {
        fill.style.width = displayP + '%'
        pct.textContent = displayP + '%'
        status.textContent = s.text
      } else {
        fill.style.width = '95%'
        pct.textContent = '95%'
        status.textContent = '正在加载模型...'
      }
    } else {
      // 模型加载完成后，显示100%
      fill.style.width = '100%'
      pct.textContent = '100%'
      status.textContent = '启动完成'
    }
  }, 400)

  // 检查是否可以隐藏
  function checkHide() {
    if (loaderHidden) return
    // 必须同时满足：Vue已就绪 AND 模型已加载完成
    if (vueReady && modelLoaded) {
      loaderHidden = true
      // 确保进度条显示100%
      fill.style.width = '100%'
      pct.textContent = '100%'
      status.textContent = '启动完成'
      
      setTimeout(() => {
        loader.classList.add('hidden')
        // 动画结束后移除元素
        setTimeout(() => loader.remove(), 800)
      }, 300)
    }
  }

  // 监听真实模型加载完成
  window.addEventListener('__modelLoaded', () => {
    modelLoaded = true
    realProgress = 100
    // 立即更新到100%
    fill.style.width = '100%'
    pct.textContent = '100%'
    status.textContent = '启动完成'
    checkHide()
  })

  // Vue 挂载后标记 ready
  // 注意：建议在 Vue 的 main.js 或 App.vue 中调用此函数
  window.__vueReady = function () {
    vueReady = true
    checkHide()
  }

  // 设置真实加载进度（0-100）
  window.__setLoaderProgress = function (p) {
    realProgress = p
    if (p > 0 && !modelLoaded) { // 模型未加载完时才更新进度条数字
      fill.style.width = p + '%'
      pct.textContent = p + '%'
    }
  }

  // 初始化时设置进度条为0%
  fill.style.width = '0%'
  pct.textContent = '0%'
</script>
