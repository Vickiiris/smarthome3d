<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能家居3D可视化</title>
    <style>
      /* ===== 加载动画 ===== */
      #app-loader {
        position: fixed;
        inset: 0;
        background: #050d18;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }

      /* Logo */
      .loader-logo {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 48px;
        animation: logoIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .loader-logo-icon {
        width: 52px;
        height: 52px;
        position: relative;
      }
      .loader-logo-icon svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 0 12px rgba(0, 212, 170, 0.6));
      }
      .loader-logo-text {
        display: flex;
        flex-direction: column;
      }
      .loader-logo-name {
        font-family: 'Orbitron', 'Arial', sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #e2e8f0;
        letter-spacing: 3px;
      }
      .loader-logo-sub {
        font-size: 12px;
        color: #00d4aa;
        letter-spacing: 4px;
        margin-top: 2px;
      }

      /* 进度条 */
      .loader-progress-wrap {
        width: 320px;
        animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .loader-progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 16px;
        box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
      }
      .loader-progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #00d4aa, #4fc3f7, #00d4aa);
        background-size: 200% 100%;
        animation: gradientFlow 2s ease infinite;
        border-radius: 6px;
        width: 0%;
        transition: width 0.3s ease;
        box-shadow: 0 0 16px rgba(0, 212, 170, 0.8), 0 0 32px rgba(0, 212, 170, 0.4);
      }
      .loader-progress-text {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .loader-status {
        font-size: 13px;
        color: #94a3b8;
        letter-spacing: 1px;
      }
      .loader-pct {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        font-weight: 600;
        color: #00d4aa;
        text-shadow: 0 0 8px rgba(0, 212, 170, 0.5);
      }

      /* 背景 - 静态渐变 */
      .loader-scan {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse at 30% 30%, rgba(0,212,170,0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 70% 70%, rgba(79,195,247,0.05) 0%, transparent 50%);
      }

      /* 角落装饰 - 简洁 */
      .loader-corner {
        position: absolute;
        width: 16px;
        height: 16px;
        opacity: 0.2;
      }
      .loader-corner.tl { top: 20px; left: 20px; border-top: 1px solid #00d4aa; border-left: 1px solid #00d4aa; }
      .loader-corner.tr { top: 20px; right: 20px; border-top: 1px solid #00d4aa; border-right: 1px solid #00d4aa; }
      .loader-corner.bl { bottom: 20px; left: 20px; border-bottom: 1px solid #00d4aa; border-left: 1px solid #00d4aa; }
      .loader-corner.br { bottom: 20px; right: 20px; border-bottom: 1px solid #00d4aa; border-right: 1px solid #00d4aa; }

      /* 粒子点 */
      .loader-dots {
        display: flex;
        gap: 6px;
        margin-top: 24px;
        animation: fadeUp 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .loader-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #00d4aa;
        opacity: 0.3;
        animation: dotPulse 1.4s ease-in-out infinite;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      .loader-dot:nth-child(4) { animation-delay: 0.6s; }
      .loader-dot:nth-child(5) { animation-delay: 0.8s; }

      /* 关键帧 */
      @keyframes logoIn {
        from { opacity: 0; transform: translateY(-20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes dotPulse {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50%       { opacity: 1;   transform: scale(1.4); }
      }
      @keyframes gradientFlow {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
      }
    </style>
  </head>
  <body>
    <!-- 加载动画 -->
    <div id="app-loader">
      <div class="loader-scan"></div>
      <div class="loader-corner tl"></div>
      <div class="loader-corner tr"></div>
      <div class="loader-corner bl"></div>
      <div class="loader-corner br"></div>

      <div class="loader-logo">
        <div class="loader-logo-icon">
          <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M26 4L4 17v18l22 13 22-13V17L26 4z" stroke="#00d4aa" stroke-width="1.5" fill="none"/>
            <path d="M26 4L4 17v18l22 13 22-13V17L26 4z" fill="rgba(0,212,170,0.06)"/>
            <circle cx="26" cy="26" r="7" fill="none" stroke="#00d4aa" stroke-width="1.5"/>
            <circle cx="26" cy="26" r="3" fill="#00d4aa"/>
            <line x1="26" y1="4" x2="26" y2="19" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
            <line x1="26" y1="33" x2="26" y2="48" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
            <line x1="4" y1="17" x2="19" y2="22" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
            <line x1="33" y1="30" x2="48" y2="35" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
            <line x1="48" y1="17" x2="33" y2="22" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
            <line x1="19" y1="30" x2="4" y2="35" stroke="#00d4aa" stroke-width="1" opacity="0.4"/>
          </svg>
        </div>
        <div class="loader-logo-text">
          <span class="loader-logo-name">SMARTHOME3D</span>
          <span class="loader-logo-sub">智能家居可视化</span>
        </div>
      </div>

      <div class="loader-progress-wrap">
        <div class="loader-progress-bar">
          <div class="loader-progress-fill" id="loader-fill"></div>
        </div>
        <div class="loader-progress-text">
          <span class="loader-status" id="loader-status">正在初始化系统...</span>
          <span class="loader-pct" id="loader-pct">0%</span>
        </div>
      </div>

      <div class="loader-dots">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>

    <script>
      // 加载进度模拟
      const fill = document.getElementById('loader-fill')
      const status = document.getElementById('loader-status')
      const pct = document.getElementById('loader-pct')
      const loader = document.getElementById('app-loader')

      const steps = [
        { p: 10, text: '正在初始化系统...' },
        { p: 25, text: '加载资源文件...' },
        { p: 45, text: '初始化 3D 引擎...' },
        { p: 65, text: '加载场景模型...' },
        { p: 80, text: '配置设备数据...' },
        { p: 95, text: '渲染用户界面...' },
        { p: 100, text: '启动完成' },
      ]

      let i = 0
      let vueReady = false
      let progressComplete = false
      let realProgress = 0
      let loaderHidden = false // 防止重复隐藏

      // 进度动画 - 由外部真实进度控制
      const timer = setInterval(() => {
        if (i >= steps.length) {
          clearInterval(timer)
          progressComplete = true
          checkHide()
          return
        }
        const s = steps[i++]
        // 使用真实进度和模拟进度中较大的那个
        const displayP = Math.max(s.p, realProgress)
        fill.style.width = displayP + '%'
        status.textContent = s.text
        pct.textContent = displayP + '%'
      }, 400)

      // 检查是否可以隐藏（必须等待真实模型加载完成）
      function checkHide() {
        if (loaderHidden) return
        if (vueReady && progressComplete) {
          loaderHidden = true
          setTimeout(() => {
            loader.classList.add('hidden')
            setTimeout(() => loader.remove(), 800)
          }, 300)
        }
      }

      // 监听真实模型加载完成
      window.addEventListener('__modelLoaded', () => {
        realProgress = 100
        fill.style.width = '100%'
        pct.textContent = '100%'
        status.textContent = '启动完成'
        // 只有模型加载完成才算 progressComplete，不依赖模拟进度
        progressComplete = true
        checkHide()
      })

      // Vue 挂载后标记 ready
      window.__hideLoader = function () {
        vueReady = true
        progressComplete = true
        checkHide()
      }

      // 设置真实加载进度（0-100）
      window.__setLoaderProgress = function (p) {
        realProgress = p
        if (p > 0) {
          fill.style.width = p + '%'
          pct.textContent = p + '%'
        }
      }
    </script>
  </body>
</html>
